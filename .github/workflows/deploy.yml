name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # There is no test suite here — the panel is generated from the schema, so the
  # things that actually break are the schema, the migrations and the boot. This
  # job exercises exactly those, against a throwaway Postgres.
  #
  # Like api/, this MUST stay on a GitHub-hosted runner: it needs a disposable
  # database. On a self-hosted runner it would find the server's own Postgres on
  # localhost:5432 and migrate the production database.
  test:
    name: Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coachwise
          POSTGRES_PASSWORD: passwd
          POSTGRES_DB: coachwise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coachwise"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://coachwise:passwd@localhost:5432/coachwise
      ADMIN_COOKIE_SECRET: ci-secret-not-used-anywhere-real

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      # The committed schema must be valid and must generate. This is the whole
      # type surface of the app — if it's stale or malformed, nothing else works.
      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      # The real gate. This is the same script the deploy runs against
      # production, applied here to an EMPTY database — so a migration that only
      # works because of leftover state on the dev box (uuid-ossp, say) fails
      # here instead of there.
      - name: Apply migrations to a fresh database
        run: npm run migrate

      # Re-running must be a no-op, because the deploy runs it on every release.
      - name: Migrations are idempotent
        run: |
          OUT=$(npm run migrate --silent)
          echo "$OUT"
          echo "$OUT" | grep -q "Already up to date" || {
            echo "::error::Re-running migrations was not a no-op — the deploy applies them on every release."
            exit 1
          }

      # Bootstrap seeds an empty admin_users, and must then leave it alone —
      # otherwise every deploy would reset the password back to the CI secret.
      - name: Bootstrap creates the first admin, then stops
        env:
          ADMIN_BOOTSTRAP_EMAIL: ci@example.com
          ADMIN_BOOTSTRAP_PASSWORD: ci-password-long-enough
        run: |
          npm run bootstrap-admin --silent | grep -q "Created first admin" || {
            echo "::error::bootstrap did not create an admin on an empty table"; exit 1; }
          npm run bootstrap-admin --silent | grep -q "already exist" || {
            echo "::error::bootstrap did not no-op when an admin already existed — a deploy would reset the password."
            exit 1
          }

      # Boot it. Catches the failures that only appear at runtime: a bad import,
      # a Prisma engine that won't load, AdminJS failing to build its resources
      # (which is how the composite-primary-key bug would have surfaced).
      - name: Boot smoke test
        run: |
          node src/index.js &
          PID=$!
          for i in $(seq 1 20); do
            curl -sf http://localhost:8100/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:8100/health || { echo "::error::/health never answered"; kill $PID; exit 1; }
          curl -sf http://localhost:8100/admin/login > /dev/null || { echo "::error::login page did not render"; kill $PID; exit 1; }
          echo "booted, /health and /admin/login both answer"
          kill $PID

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: |
          echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set lowercase repository name
        run: |
          echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        env:
          # The first admin. Only used when admin_users is empty — see
          # scripts/bootstrap-admin.js. Passed into the remote shell as env vars
          # (below), never interpolated into the script text.
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          ADMIN_BOOTSTRAP_NAME: ${{ secrets.ADMIN_BOOTSTRAP_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ADMIN_BOOTSTRAP_EMAIL,ADMIN_BOOTSTRAP_PASSWORD,ADMIN_BOOTSTRAP_NAME
          script: |
            set -e

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pin to the exact commit built by this run, so a re-deploy can never
            # pick up a different :latest.
            IMAGE=ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
            docker pull "$IMAGE"

            # DATABASE_URL and ADMIN_COOKIE_SECRET live on the server, next to
            # api's config.yml — never in the workflow, never on the docker
            # command line where `ps` would show them. See the README.
            if [ ! -f /etc/coachwise/admin.env ]; then
              echo "/etc/coachwise/admin.env is missing — see admin/README.md"
              exit 1
            fi

            # Migrations. Idempotent, tracked in admin_migrations — which is none
            # of api's schema_migrations' business; the two never touch.
            docker run --rm \
              --network host \
              --env-file /etc/coachwise/admin.env \
              "$IMAGE" \
              npm run migrate

            # The first admin, if there isn't one yet. `-e VAR` with no `=value`
            # passes the value through from the shell environment, so the
            # password never appears in the process arguments — `ps` on the
            # server would otherwise show it in full.
            docker run --rm \
              --network host \
              --env-file /etc/coachwise/admin.env \
              -e ADMIN_BOOTSTRAP_EMAIL \
              -e ADMIN_BOOTSTRAP_PASSWORD \
              -e ADMIN_BOOTSTRAP_NAME \
              "$IMAGE" \
              npm run bootstrap-admin

            docker stop coachwise-admin || true
            docker rm coachwise-admin || true
            docker run -d \
              --name coachwise-admin \
              --restart always \
              --network host \
              --env-file /etc/coachwise/admin.env \
              -e NODE_ENV=production \
              "$IMAGE"

            docker logout ghcr.io
            docker image prune -f

            # Green only once the container we just started is both the image we
            # built and actually answering.
            RUNNING_IMAGE=$(docker inspect -f '{{.Config.Image}}' coachwise-admin)
            if [ "$RUNNING_IMAGE" != "$IMAGE" ]; then
              echo "Running image is $RUNNING_IMAGE, expected $IMAGE"
              exit 1
            fi

            for i in $(seq 1 15); do
              curl -sf http://localhost:8100/health >/dev/null 2>&1 && \
                echo "Admin is up on ${{ github.sha }}" && exit 0
              sleep 2
            done
            echo "Admin did not answer /health"
            docker logs --tail 50 coachwise-admin
            exit 1
